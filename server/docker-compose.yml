services:
  hmem:
    image: server-hmem:latest
    ports:
      - "${HMEM_PORT:-8002}:8000"
    volumes:
      - hmem-data:/data/hmem
      - /root/codes/hmem/server:/app
    environment:
      HMEM_API_KEY: ${HMEM_API_KEY:-change-me}

      # 向量嵌入 & 重排（OpenAI 兼容 API）
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://localhost:3000/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-sk-your-api-key-here}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      RERANK_MODEL: ${RERANK_MODEL:-rerankv2m3}

      # Reflect 引擎（复用 embedding 的 LLM 渠道做聚类）
      REFLECT_INTERVAL: ${REFLECT_INTERVAL:-60}
      REFLECT_MIN_EXPERIENCES: ${REFLECT_MIN_EXPERIENCES:-5}
      REFLECT_MIN_OBSERVATIONS: ${REFLECT_MIN_OBSERVATIONS:-3}
      REFLECT_MIN_INSIGHTS: ${REFLECT_MIN_INSIGHTS:-2}
    restart: unless-stopped

volumes:
  hmem-data:
